body:
  text: 卿大夫章非先王之法服不敢服非先王之法言不敢道非先王之德行不敢行是故非法不言非道不行口無擇言身無擇行言滿天下無口過行滿天下無怨惡三者備矣然後能守其宗廟蓋卿大夫之孝也詩云夙夜匪懈以事一人

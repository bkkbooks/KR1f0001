body:
  text: 廣要道章子曰教民親愛莫善於孝教民禮順莫善於悌移風易俗莫善於樂安上治民莫善於禮禮者敬而已矣故敬其父則子悅敬其兄則弟悅敬其君則臣悅敬一人而千萬人悅所敬者寡而悅者眾此之謂要道也

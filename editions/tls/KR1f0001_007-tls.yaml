body:
  text: 三才章曾子曰甚哉孝之大也子曰夫孝天之經也地之義也民之行也天地之經而民是則之則天之明因地之利以順天下是以其教不肅而成其政不嚴而治先王見教之可以化民也是故先之以博愛而民莫遺其親陳之以德義而民興行先之以敬讓而民不爭導之以禮樂而民和睦示之以好惡而民知禁詩云赫赫師尹民具爾瞻

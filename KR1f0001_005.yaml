body:
  text: 士章資於事父以事母而愛同資於事父以事君而敬同故母取其愛而君取其敬兼之者父也故以孝事君則忠以敬事長則順忠順不失以事其上然後能保其祿位而守其祭祀蓋士之孝也詩云夙興夜寐無忝爾所生

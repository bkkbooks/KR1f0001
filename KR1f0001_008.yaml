body:
  text: 孝治章子曰昔者明王之以孝治天下也不敢遺小國之臣而況於公侯伯子男乎故得萬國之歡心以事其先王治國者不敢侮於鰥寡而況於士民乎故得百姓之歡心以事其先君治家者不敢失於臣妾而況於妻子乎故得人之歡心以事其親夫然故生則親安之祭則鬼享之是以天下和平災害不生禍亂不作故明王之以孝治天下也如此詩云有覺德行四國順之
  hash: sha256:712e2d201db34e1ad36a5eb3bbdf2e35dc4d75d3a27f3079f8a00b67d2eb0962

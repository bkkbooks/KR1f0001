body:
  text: 紀孝行章子曰孝子之事親也居則致其敬養則致其樂病則致其憂喪則致其哀祭則致其嚴五者備矣然後能事親事親者居上不驕為下不亂在醜不爭居上而驕則亡為下而亂則刑在醜而爭則兵三者不除雖日用三牲之養猶為不孝也

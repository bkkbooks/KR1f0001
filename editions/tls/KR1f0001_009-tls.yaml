body:
  text: 聖治章曾子曰敢問聖人之德無以加於孝乎子曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大於配天則周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之內各以其職來祭夫聖人之德又何以加於孝乎故親生之膝下以養父母日嚴聖人因嚴以教敬因親以教愛聖人之教不肅而成其政不嚴而治其所因者本也父子之道天性也君臣之義也父母生之續莫大焉君親臨之厚莫重焉故不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮以順則逆民無則焉不在於善而皆在於凶德雖得之君子不貴也君子則不然言思可道行思可樂德義可尊作事可法容止可觀進退可度以臨其民是以其民畏而愛之則而象之故能成其德教而行其政令詩云淑人君子其儀不忒

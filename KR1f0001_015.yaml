body:
  text: 諫諍章曾子曰若夫慈愛恭敬安親揚名則聞命矣敢問子從父之令可謂孝乎子曰是何言與是何言與昔者天子有爭臣七人雖無道不失其天下諸侯有爭臣五人雖無道不失其國大夫有爭臣三人雖無道不失其家士有爭友則身不離於令名父有爭子則身不陷於不義故當不義則子不可以不爭於父臣不可以不爭於君故當不義則爭之從父之令又焉得為孝乎

body:
  text: 感應章子曰昔者明王事父孝故事天明事母孝故事地察長幼順故上下治天地明察神明彰矣故雖天子必有尊也言有父也必有先也言有兄也宗廟致敬不忘親也脩身慎行恐辱先也宗廟致敬鬼神著矣孝悌之至通於神明光于四海無所不通詩云自西自東自南自北無思不服

body:
  text: 喪親章子曰孝子之喪親也哭不偯禮無容言不文服美不安聞樂不樂食旨不甘此哀戚之情也三日而食教民無以死傷生毀不滅性此聖人之政也喪不過三年示民有終也為之棺椁衣衾而舉之陳其簠簋而哀慼之擗踊哭泣哀以送之卜其宅兆而安措之為之宗廟以鬼享之春秋祭祀以時思之生事愛敬死事哀慼生民之本盡矣死生之義備矣孝子之事親終矣

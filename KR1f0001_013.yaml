body:
  text: 廣至德章子曰君子之教以孝也非家至而日見之也教以孝所以敬天下之為人父者也教以悌所以敬天下之為人兄者也教以臣所以敬天下之為人君者也詩云愷悌君子民之父母非至德其孰能順民如此其大者乎

body:
  text: 開宗明義章仲尼居曾子侍子曰先王有至德要道以順天下民用和睦上下無怨汝知之乎曾子避席曰參不敏何足以知之子曰夫孝德之本也教之所由生也復坐吾語汝身體髮膚受之父母不敢毀傷孝之始也立身行道揚名於後世以顯父母孝之終也夫孝始於事親中於事君終於立身大雅云無念爾祖聿脩厥德
